[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "aria-rewards"
version = "0.1.0"
description = "Six-dimensional reward function for the ARIA OpenEnv environment."
requires-python = ">=3.11"
dependencies = [
    "aria-contracts>=0.1,<0.2",
    "pydantic>=2.7,<3",
]

[project.optional-dependencies]
dev = ["pytest>=8"]

[tool.setuptools.packages.find]
where = ["src"]
